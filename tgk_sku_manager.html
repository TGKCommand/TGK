async function loadAll(){

function lifecycleOf(row){
  if(row.discontinued)return 'discontinued';
  if(row.stage==='dev')return 'dev';
  return 'live';
}

// Mirrors the ERP's own classification heuristic exactly (isHWPack + the subassembly pattern
// check in tgk_erp.html) so a SKU created here lands with the same is_subassembly value the ERP
// would infer client-side. This matters because the dealer price list query filters on this
// column directly in the database (.eq('is_subassembly', false)) rather than relying on the
// ERP's in-browser normalization — a NULL here would make a new finished good invisible there.
function isHWPack(pn){ return /^TGK-P\d/i.test(pn||''); }
function detectIsSubassembly(pn){ return /^\d{2}-\d{4}/.test(pn||'') && !isHWPack(pn); }

function skuExists(pn,excludeId,excludeType){
  const needle=(pn||'').trim().toLowerCase();
  if(!needle)return null;
  return S.allSkus.find(r=>
    r.pn.trim().toLowerCase()===needle &&
    !(excludeId!=null && r.id===excludeId && r._type===excludeType)
  )||null;
}

// Given whatever the user has typed so far (e.g. "TGK-" or "TGK-12"), finds every existing SKU
// sharing the same non-numeric prefix, figures out the digit-width convention already in use for
// that prefix, and suggests the next sequential numbers plus any gaps left by deleted/renamed SKUs.
function suggestNextSkus(typed){
  const t=(typed||'').trim().toUpperCase();
  const m=t.match(/^(.*?)(\d*)$/);
  if(!m)return null;
  const prefix=m[1];
  if(!prefix)return null; // nothing to anchor suggestions to yet (e.g. user typed only digits)

  const matches=S.allSkus
    .map(r=>r.pn.toUpperCase())
    .filter(pn=>pn.startsWith(prefix))
    .map(pn=>pn.slice(prefix.length))
    .filter(rest=>/^\d+$/.test(rest))
    .map(rest=>({num:parseInt(rest,10),width:rest.length}));

  if(!matches.length){
    // Brand new prefix — nothing to anchor to, just suggest a friendly starting point.
    const typedDigits=m[2];
    const width=typedDigits.length>=3?typedDigits.length:4;
    return {prefix,width,next:[1].map(n=>prefix+String(n).padStart(width,'0')),gaps:[],isNewPrefix:true};
  }

  // Use the most common digit-width among existing matches as the convention for this prefix.
  const widthCounts={};
  matches.forEach(mt=>{widthCounts[mt.width]=(widthCounts[mt.width]||0)+1;});
  const width=Object.keys(widthCounts).sort((a,b)=>widthCounts[b]-widthCounts[a])[0]|0;
  const nums=matches.filter(mt=>mt.width===width).map(mt=>mt.num).sort((a,b)=>a-b);
  const min=nums[0],max=nums[nums.length-1];

  const gaps=[];
  for(let n=min;n<max&&gaps.length<3;n++){
    if(!nums.includes(n))gaps.push(n);
  }
  const next=[];
  for(let n=max+1;next.length<3;n++)next.push(n);

  return {
    prefix,width,isNewPrefix:false,
    gaps:gaps.map(n=>prefix+String(n).padStart(width,'0')),
    next:next.map(n=>prefix+String(n).padStart(width,'0'))
  };
}

function renderSkuSuggestions(){
  const el=$('sku-suggestions');
  if(!el)return;
  const typed=$('f-pn').value;
  const sug=suggestNextSkus(typed);
  if(!sug||(!sug.next.length&&!sug.gaps.length)){el.innerHTML='';return;}
  if(sug.isNewPrefix){
    el.innerHTML='<div class="t3xs">New prefix — no existing SKUs to match against. '+
      '<span class="pill pill-muted" style="cursor:pointer" onclick="pickSuggestedSku(\''+sug.next[0]+'\')">'+sug.next[0]+'</span> suggested as a starting point.</div>';
    return;
  }
  let html='<div class="t3xs" style="margin-top:4px">';
  if(sug.gaps.length){
    html+='Available (gap): '+sug.gaps.map(s=>'<span class="pill pill-orange" style="cursor:pointer;margin-right:4px" onclick="pickSuggestedSku(\''+s+'\')">'+s+'</span>').join('')+' &nbsp; ';
  }
  html+='Next: '+sug.next.map(s=>'<span class="pill pill-teal" style="cursor:pointer;margin-right:4px" onclick="pickSuggestedSku(\''+s+'\')">'+s+'</span>').join('');
  html+='</div>';
  el.innerHTML=html;
}

function pickSuggestedSku(pn){
  $('f-pn').value=pn;
  checkDupLive();
  renderSkuSuggestions();
}

  if(!row.new_sku)return '<span class="t3xs">—</span>';
  const activeBadge=row.use_new_sku?'<span class="pill pill-orange" title="New SKU is now the active one used for sync/pricing">Active</span>':'<span class="pill pill-muted" title="New SKU is on file but not yet switched over">Pending</span>';
  return '<span class="pn" style="color:var(--text3)">'+escHtml(row.pn)+'</span> &rarr; <span class="pn" style="color:var(--teal)">'+escHtml(row.new_sku)+'</span> '+activeBadge;
}

function filteredSkus(){
  const q=S.searchQ.trim().toLowerCase();
  return S.allSkus.filter(r=>{
    if(S.typeFilter && r._type!==S.typeFilter)return false;
    if(S.catFilter && (r.category||'')!==S.catFilter)return false;
    if(S.stageFilter && lifecycleOf(r)!==S.stageFilter)return false;
    if(S.legacyFilter==='has' && !r.new_sku)return false;
    if(S.legacyFilter==='none' && r.new_sku)return false;
    if(q){
      const hay=(r.pn+' '+(r.description||'')+' '+(r.category||'')+' '+(r.notes||'')).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
}

      </div>
      <select class="form-input" style="max-width:140px" onchange="S.typeFilter=this.value;render()">

      <select class="form-input" style="max-width:150px" onchange="S.stageFilter=this.value;render()">
        <option value="">All Lifecycles</option>
        <option value="dev" ${S.stageFilter==='dev'?'selected':''}>Dev</option>
        <option value="live" ${S.stageFilter==='live'?'selected':''}>Live</option>
        <option value="discontinued" ${S.stageFilter==='discontinued'?'selected':''}>Discontinued</option>
      </select>
      <select class="form-input" style="max-width:150px" onchange="S.legacyFilter=this.value;render()">
        <option value="">Legacy: All</option>
        <option value="has" ${S.legacyFilter==='has'?'selected':''}>Has New SKU</option>
        <option value="none" ${S.legacyFilter==='none'?'selected':''}>No New SKU</option>
      </select>
      <span class="filter-count">${rows.length} of ${S.allSkus.length} SKUs</span>

    <div class="tbl-wrap">

          <th>SKU</th><th>Type</th><th>Category</th><th>Description</th><th>Lifecycle</th><th>New SKU</th><th>Notes</th><th>Link</th><th></th>

          ${rows.length===0?'<tr><td colspan="9" class="section-empty">No SKUs match your filters.</td></tr>':''}

              <td class="main-col pn">${escHtml(r.pn)}</td>
              <td>${r._type==='part'?'Raw Part':'Assembly'}</td>

              <td>${escHtml(r.description||'—')}</td>
              <td>${pillForLifecycle(lifecycleOf(r))}</td>
              <td>${legacySkuCell(r)}</td>
              <td>${r.notes?'<span title="'+escHtml(r.notes)+'">&#128221;</span>':''}</td>
              <td>${r.reference_url?'<a href="'+escHtml(r.reference_url)+'" target="_blank" onclick="event.stopPropagation()">&#128279;</a>':''}</td>

// ---------- Master Lookup ----------
const FIELD_LABELS={
  vendor:'Vendor',unit_cost:'Unit Cost',lead_time_weeks:'Lead Time (weeks)',avg_sales_wk:'Avg Sales / Week',
  total_unpckgd:'On Hand (Unpackaged)',min_qty:'Min Qty',max_qty:'Max Qty',moq:'MOQ',safety_stock:'Safety Stock',
  price_breaks:'Price Breaks',location:'Bin Location',drawing_url:'Drawing / Spec URL',image_url:'Image URL',
  msrp:'MSRP',shipping_cost:'Shipping Cost',total_on_hand:'On Hand',status:'Inventory Status',
  cc_project:'Command Center Project',pl_notes:'Price List Notes',product_url:'Product URL',
  build_to_order:'Build to Order',is_subassembly:'Subassembly',total_assembled:'Total Ever Assembled',
  sales_price:'Sale Price Override',ship_us:'Ship (US)',ship_ca:'Ship (CA)',ship_intl:'Ship (Intl)',
  pl_active:'Active on Price List',category:'Category',description:'Description',notes:'Notes',
  reference_url:'Reference Link',new_sku:'New SKU',use_new_sku:'Using New SKU',stage:'Lifecycle Stage',
  discontinued:'Discontinued',created_at:'Created',updated_at:'Last Updated',id:'Internal ID',pn:'SKU'
};
// Fields already surfaced prominently in the header/identity section — omitted from the generic grid.
const DOSSIER_OMIT=new Set(['pn','id','category','description','notes','reference_url','new_sku','use_new_sku','stage','discontinued']);

function fmtFieldValue(key,val){
  if(val==null||val==='')return '<span class="t3xs">—</span>';
  if(typeof val==='boolean')return val?'Yes':'No';
  if(key==='price_breaks'&&Array.isArray(val)){
    if(!val.length)return '<span class="t3xs">—</span>';
    return val.map(b=>b.qty+'+ @ $'+parseFloat(b.price||0).toFixed(2)).join(', ');
  }
  if(key.endsWith('_url')&&/^https?:\/\//.test(val))return '<a href="'+escHtml(val)+'" target="_blank">'+escHtml(val)+'</a>';
  if(key.endsWith('_at')){try{return new Date(val).toLocaleString();}catch(e){return escHtml(String(val));}}
  if(typeof val==='number')return String(val);
  return escHtml(String(val));
}

async function openLookup(pn,type){
  showModal('<div class="loading-state"><div class="spinner"></div>Loading SKU dossier…</div>');
  try{
    const table=type==='part'?'parts':'assemblies';
    const [{data:full,error},filesRes]=await Promise.all([
      db.from(table).select('*').eq('pn',pn).single(),
      db.from('part_files').select('*').eq('entity_pn',pn).order('created_at',{ascending:false})
    ]);
    if(error)throw error;
    showModal(dossierBody(full,type,filesRes.data||[]));
  }catch(err){
    showModal('<div class="section-empty">Failed to load SKU: '+escHtml(err.message)+'</div><div class="modal-footer"><button class="btn" onclick="closeModal()">Close</button></div>');
  }
}

function dossierBody(row,type,files){
  const otherKeys=Object.keys(row).filter(k=>!DOSSIER_OMIT.has(k)).sort((a,b)=>(FIELD_LABELS[a]||a).localeCompare(FIELD_LABELS[b]||b));
  return `
  <div class="modal-title">
    <span class="pn" style="font-size:15px;color:var(--text)">${escHtml(row.pn)}</span>
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
    <span class="pill pill-muted">${type==='part'?'Raw Part':'Assembly'}</span>
    ${pillForLifecycle(lifecycleOf(row))}
    ${row.category?'<span class="pill pill-teal">'+escHtml(row.category)+'</span>':''}
  </div>
  <div class="panel" style="padding:14px 16px">
    <div class="panel-title">Identity</div>
    <div class="inline-stat"><span class="t2s">Description</span><span>${escHtml(row.description||'—')}</span></div>
    <div class="inline-stat"><span class="t2s">Notes</span><span>${escHtml(row.notes||'—')}</span></div>
    <div class="inline-stat"><span class="t2s">Reference Link</span><span>${row.reference_url?'<a href="'+escHtml(row.reference_url)+'" target="_blank">'+escHtml(row.reference_url)+'</a>':'—'}</span></div>
    ${row.new_sku?`<div class="inline-stat"><span class="t2s">New SKU</span><span>${legacySkuCell(row)}</span></div>`:''}
  </div>
  <div class="panel" style="padding:14px 16px">
    <div class="panel-title">All Fields</div>
    ${otherKeys.map(k=>`<div class="inline-stat"><span class="t2s">${escHtml(FIELD_LABELS[k]||k)}</span><span>${fmtFieldValue(k,row[k])}</span></div>`).join('')}
  </div>
  <div class="panel" style="padding:14px 16px">
    <div class="panel-title">Files (${files.length})</div>
    ${files.length===0?'<div class="t3xs">No files attached.</div>':files.map(f=>
      '<div style="display:flex;align-items:center;gap:8px;padding:4px 0">'+
      '<a href="'+escHtml(f.file_url)+'" target="_blank" style="flex:1;font-size:12px;color:var(--teal);text-decoration:none">&#128206; '+escHtml(f.file_name)+'</a>'+
      '</div>').join('')}
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Close</button>
    <button class="btn btn-primary" onclick="closeModal();openEditSkuModal('${escHtml(row.pn)}','${type}')">Edit</button>
  </div>`;
}

// ---------- Modal: New / Edit SKU ----------
function openNewSkuModal(){
  S.editing=null;
  S.pendingFiles=[];
  S.existingFiles=[];
  showModal(modalBody({}));
}

async function openEditSkuModal(pn,type){
  const row=S.allSkus.find(r=>r.pn===pn && r._type===type);
  if(!row){toast('SKU not found');return;}
  S.editing={id:row.id,type:row._type,origPn:row.pn};
  S.pendingFiles=[];
  showModal(modalBody(row));
  loadFilesFor(row.pn);
}

function showModal(html){
  $('modal-box').innerHTML=html;
  $('modal-overlay').classList.remove('hidden');
}
function closeModal(){
  $('modal-overlay').classList.add('hidden');
  $('modal-box').innerHTML='';
}

function modalBody(row){
  const isEdit=!!S.editing;
  const stage=row.stage==='dev'?'dev':(row.discontinued?'discontinued':(row.stage||'live'));
  return `
  <div class="modal-title">
    <span>${isEdit?'Edit SKU':'New SKU'}</span>
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
  </div>
  <div class="form-row cols-2">
    <div class="form-group">
      <label class="form-label">SKU / Part Number</label>
      <input id="f-pn" class="form-input" value="${escHtml(row.pn||'')}" placeholder="e.g. TGK-1234" oninput="checkDupLive();renderSkuSuggestions()" style="text-transform:uppercase" onblur="this.value=this.value.trim()">
      <div id="dup-warning" style="display:none;color:var(--red);font-size:11px;margin-top:4px">&#9888; This SKU already exists — choose a different one.</div>
      <div id="sku-suggestions"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select id="f-type" class="form-input" ${isEdit?'disabled':''}>
        <option value="part" ${(row._type||'part')==='part'?'selected':''}>Raw Part</option>
        <option value="assembly" ${row._type==='assembly'?'selected':''}>Assembly</option>
      </select>
      ${isEdit?'<div class="t3xs" style="margin-top:4px">Type can\'t be changed after creation.</div>':''}
    </div>
  </div>
  <div class="form-row cols-2">
    <div class="form-group">
      <label class="form-label">Category</label>
      <input id="f-cat" class="form-input" list="cat-datalist" value="${escHtml(row.category||'')}" placeholder="e.g. Hardware, Suspension, Packaging…">
    </div>
    <div class="form-group">
      <label class="form-label">Lifecycle Stage</label>
      <select id="f-stage" class="form-input">
        <option value="dev" ${stage==='dev'?'selected':''}>Dev — in development</option>
        <option value="live" ${stage==='live'?'selected':''}>Live</option>
        <option value="discontinued" ${stage==='discontinued'?'selected':''}>Discontinued</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="f-desc" class="form-input" rows="2" placeholder="Short description of this SKU">${escHtml(row.description||'')}</textarea>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea id="f-notes" class="form-input" rows="3" placeholder="Internal notes about this SKU">${escHtml(row.notes||'')}</textarea>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Reference Link</label>
      <input id="f-link" class="form-input" value="${escHtml(row.reference_url||'')}" placeholder="https://…">
    </div>
  </div>
  <div class="form-row cols-2">
    <div class="form-group">
      <label class="form-label">New SKU (if this is being replaced)</label>
      <input id="f-new-sku" class="form-input" value="${escHtml(row.new_sku||'')}" placeholder="e.g. TGK-5678" style="text-transform:uppercase">
    </div>
    <div class="form-group">
      <label class="form-label">Use New SKU</label>
      <select id="f-use-new-sku" class="form-input">
        <option value="false" ${!row.use_new_sku?'selected':''}>Not yet — new SKU is pending</option>
        <option value="true" ${row.use_new_sku?'selected':''}>Yes — new SKU is now active</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Files</label>
      <div id="files-list">${isEdit?'<div class="t3xs">Loading files…</div>':'<div class="t3xs">Save the SKU first, then attach files.</div>'}</div>
      <input type="file" id="f-files" multiple ${isEdit?'':'disabled'} onchange="stageFiles(this.files)" style="margin-top:8px;font-size:12px">
      <div id="staged-files" class="t3xs" style="margin-top:4px"></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="save-btn" onclick="saveSku()">Save SKU</button>
  </div>`;
}

function checkDupLive(){
  const pn=$('f-pn').value;
  const excludeId=S.editing?S.editing.id:null;
  const excludeType=S.editing?S.editing.type:null;
  const dup=skuExists(pn,excludeId,excludeType);
  $('dup-warning').style.display=dup?'block':'none';
  $('save-btn').disabled=!!dup;
}

// ---------- Files ----------
async function loadFilesFor(pn){
  try{
    const{data,error}=await db.from('part_files').select('*').eq('entity_pn',pn).order('created_at',{ascending:false});
    if(error)throw error;
    S.existingFiles=data||[];
    renderFilesList();
  }catch(err){
    $('files-list').innerHTML='<div class="t3xs" style="color:var(--red)">Failed to load files: '+escHtml(err.message)+'</div>';
  }
}

function renderFilesList(){
  const el=$('files-list');
  if(!el)return;
  if(!S.existingFiles.length){el.innerHTML='<div class="t3xs">No files attached yet.</div>';return;}
  el.innerHTML=S.existingFiles.map(f=>`
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0">
      <a href="${escHtml(f.file_url)}" target="_blank" style="flex:1;font-size:12px;color:var(--teal);text-decoration:none">&#128206; ${escHtml(f.file_name)}</a>
      <button class="action-btn del" onclick="deleteFile('${f.id}')">Remove</button>
    </div>`).join('');
}

function stageFiles(fileList){
  S.pendingFiles=[...S.pendingFiles,...Array.from(fileList)];
  $('staged-files').innerHTML=S.pendingFiles.length?
    ('Queued: '+S.pendingFiles.map(f=>escHtml(f.name)).join(', ')+' — will upload after you save/re-save.'):'';
}

async function uploadStagedFiles(pn,entityType){
  for(const file of S.pendingFiles){
    try{
      const path=pn+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const{error:se}=await db.storage.from('part-files').upload(path,file,{upsert:false});
      if(se)throw se;
      const{data:ud}=db.storage.from('part-files').getPublicUrl(path);
      await db.from('part_files').insert({
        entity_pn:pn,entity_type:entityType,file_name:file.name,
        file_url:ud.publicUrl,category:'Other',size_bytes:file.size,
        created_by:null
      });
    }catch(err){
      toast('File upload failed for '+file.name+': '+err.message);
    }
  }
  S.pendingFiles=[];
}

async function deleteFile(fileId){
  if(!confirm('Remove this file?'))return;
  const{error}=await db.from('part_files').delete().eq('id',fileId);
  if(error){toast('Error: '+error.message);return;}
  S.existingFiles=S.existingFiles.filter(f=>f.id!==fileId);
  renderFilesList();
  toast('File removed');
}

// ---------- Save ----------
async function saveSku(){
  const pn=$('f-pn').value.trim().toUpperCase();
  if(!pn){toast('SKU is required');return;}
  const type=S.editing?S.editing.type:$('f-type').value;
  const dup=skuExists(pn,S.editing?S.editing.id:null,S.editing?S.editing.type:null);
  if(dup){toast('SKU already exists — choose a different one');return;}

  const category=$('f-cat').value.trim();
  const description=$('f-desc').value.trim();
  const notes=$('f-notes').value.trim();
  const referenceUrl=$('f-link').value.trim();
  const newSku=$('f-new-sku').value.trim().toUpperCase()||null;
  const useNewSku=$('f-use-new-sku').value==='true';
  const stageVal=$('f-stage').value; // 'dev' | 'live' | 'discontinued'
  const discontinued=stageVal==='discontinued';
  const stage=discontinued?null:(stageVal==='dev'?'dev':null);

  $('save-btn').disabled=true;$('save-btn').textContent='Saving…';

  try{
    let error,data;
    if(S.editing){
      const table=type==='part'?'parts':'assemblies';
      const payload={pn,category,description,notes,reference_url:referenceUrl||null,new_sku:newSku,use_new_sku:useNewSku,discontinued,stage,updated_at:new Date().toISOString()};
      const origPn=S.editing.origPn;
      if(pn!==origPn){
        // Mirror the ERP's SKU-rename cascade so downstream references don't silently break
        await db.from('bom_items').update({child_pn:pn}).eq('child_pn',origPn);
        await db.from('inv_corrections').update({pn}).eq('pn',origPn);
        await db.from('shopify_sync_log').update({pn}).eq('pn',origPn);
        await db.from('part_files').update({entity_pn:pn}).eq('entity_pn',origPn);
      }
      ({error}=await db.from(table).update(payload).eq('id',S.editing.id));
    } else {
      if(type==='part'){
        const payload={
          pn,vendor:'',description,category,unit_cost:0,lead_time_weeks:1,avg_sales_wk:0,
          total_unpckgd:0,min_qty:0,max_qty:0,moq:0,safety_stock:0,price_breaks:[],
          location:'',drawing_url:'',image_url:null,discontinued,stage,
          notes,reference_url:referenceUrl||null,new_sku:newSku,use_new_sku:useNewSku,
          updated_at:new Date().toISOString()
        };
        ({data,error}=await db.from('parts').insert(payload).select().single());
      } else {
        const payload={
          pn,description,category,msrp:0,shipping_cost:10,total_on_hand:0,status:'ok',
          location:null,avg_sales_wk:0,drawing_url:'',image_url:null,discontinued,stage,
          new_sku:newSku,use_new_sku:useNewSku,cc_project:null,pl_notes:null,product_url:null,
          build_to_order:false,notes,reference_url:referenceUrl||null,
          is_subassembly:detectIsSubassembly(pn),total_assembled:0,
          sales_price:null,ship_us:null,ship_ca:null,ship_intl:null,pl_active:true,
          updated_at:new Date().toISOString()
        };
        ({data,error}=await db.from('assemblies').insert(payload).select().single());
      }
    }
    if(error)throw error;

    if(S.pendingFiles.length){
      await uploadStagedFiles(pn,type);
    }

    toast(S.editing?'SKU updated':'SKU created');
    closeModal();
    await loadAll();
  }catch(err){
    toast('Save failed: '+err.message);
    $('save-btn').disabled=false;$('save-btn').textContent='Save SKU';
  }
}

// ---------- Boot ----------
function initSupabase(){
  if(typeof supabase==='undefined'||typeof supabase.createClient==='undefined'){
    setTimeout(initSupabase,150);
    return;
  }
  db=supabase.createClient(SUPA_URL,SUPA_KEY);
  loadAll();
}
document.addEventListener('DOMContentLoaded',function(){
  var vb=document.getElementById('version-badge');
  if(vb)vb.textContent='TGK SKU Manager '+SKU_TOOL_VERSION;
});
document.addEventListener('DOMContentLoaded',initSupabase);

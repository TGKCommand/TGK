<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGK Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--bg2:#f7f8fa;--bg3:#f0f2f5;--bg4:#e9ebee;--bg5:#dde0e5;--border:#e2e6eb;--border2:#c8cdd5;--text:#111827;--text2:#374151;--text3:#6b7280;--teal:#0d9488;--teal-d:#0f766e;--teal-dim:rgba(13,148,136,.09);--orange:#ea580c;--orange-d:#c2410c;--orange-dim:rgba(234,88,12,.09);--red:#dc2626;--red-dim:rgba(220,38,38,.09);--green:#16a34a;--green-dim:rgba(22,163,74,.09);--yellow:#d97706;--blue:#2563eb;--purple:#7c3aed;--r:6px;--r-lg:10px;--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased}
input,button,select,textarea{font-family:var(--font)}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar-wrap{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow:hidden}
.sidebar{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-logo{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:relative}
.sidebar-logo::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--orange) 60%,transparent)}
.logo-img{width:140px;height:auto;object-fit:contain;display:block}
.sidebar-section{padding:14px 14px 4px;font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);opacity:.85}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 12px;margin:1px 8px;border-radius:8px;cursor:pointer;transition:all .12s;border:1px solid transparent;background:transparent;width:calc(100% - 16px);text-align:left;color:var(--text2);font-size:12px;font-weight:500;outline:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.off{opacity:.4}
.nav-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;background:var(--text3)}
.nav-badge{font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);background:var(--bg4);border:1px solid var(--border);padding:1px 6px;border-radius:10px;min-width:22px;text-align:center;margin-left:auto}
.me-card{margin:10px 12px 2px;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
.me-row{display:flex;align-items:center;gap:8px}
.me-avatar{width:26px;height:26px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.me-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.me-change{font-size:10px;color:var(--teal);background:none;border:none;cursor:pointer;padding:2px 0 0;text-align:left}
.me-change:hover{text-decoration:underline}
.sidebar-footer{margin-top:auto;padding:10px 14px 14px;border-top:1px solid var(--border);flex-shrink:0}
.sync-pill{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.busy{background:var(--orange);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:11px;color:var(--text2);flex:1;font-weight:500}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;z-index:10;position:relative}
.topbar::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--teal) 0%,var(--teal) 30%,var(--orange) 70%,transparent 100%);opacity:.7}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.01em}
.month-nav{display:flex;align-items:center;gap:4px;margin-left:14px}
.month-label{font-size:14px;font-weight:700;color:var(--text);min-width:150px;text-align:center;font-variant-numeric:tabular-nums}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:7px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;font-weight:600;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;transition:all .12s;letter-spacing:.01em}
.btn:hover{background:var(--bg5);color:var(--text)}
.btn-primary{background:var(--orange);border-color:var(--orange);color:#fff}
.btn-primary:hover{background:var(--orange-d);border-color:var(--orange-d)}
.btn-sm{padding:4px 10px;font-size:11px}
.icon-btn{width:30px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:15px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);cursor:pointer}
.icon-btn:hover{background:var(--bg5);color:var(--text)}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:18px 22px;position:relative}
.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;opacity:.06}
.watermark img{width:460px;height:auto}
.content-inner{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid var(--border);border-bottom:none;border-radius:var(--r-lg) var(--r-lg) 0 0;overflow:hidden;background:var(--bg3)}
.cal-wd{padding:7px 10px;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:left;border-right:1px solid var(--border)}
.cal-wd:last-child{border-right:none}
.cal-grid{flex:1;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:0 0 var(--r-lg) var(--r-lg);overflow:hidden;background:var(--bg)}
.cal-week{position:relative;border-bottom:1px solid var(--border);flex:1 1 0}
.cal-week:last-child{border-bottom:none}
.cal-week-bg{display:grid;grid-template-columns:repeat(7,1fr);height:100%}
.cal-day{border-right:1px solid var(--border);padding:4px;cursor:pointer;transition:background .1s;min-height:86px}
.cal-day:last-child{border-right:none}
.cal-day:hover{background:var(--bg2)}
.cal-day.out{background:var(--bg2)}
.cal-day.out .cal-daynum{color:var(--border2)}
.cal-daynum{font-size:12px;font-weight:600;color:var(--text2);width:24px;height:22px;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;border-radius:6px}
.cal-day.today .cal-daynum{background:var(--orange);color:#fff}
.cal-bars{position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none}
.cal-bar{position:absolute;height:18px;border-radius:5px;font-size:10.5px;font-weight:600;color:#fff;padding:0 7px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;pointer-events:auto;box-shadow:0 1px 2px rgba(0,0,0,.12);transition:filter .1s}
.cal-bar:hover{filter:brightness(1.08)}
.cal-bar.contL{border-top-left-radius:0;border-bottom-left-radius:0}
.cal-bar.contR{border-top-right-radius:0;border-bottom-right-radius:0}
.cal-more{position:absolute;font-size:10px;font-weight:600;color:var(--text3);pointer-events:none}
.empty-note{text-align:center;color:var(--text3);font-size:12px;padding:8px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 16px 48px rgba(0,0,0,.18)}
.modal-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:2px}
.modal-close:hover{color:var(--text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.form-row{display:grid;gap:10px;margin-bottom:12px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3)}
.form-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:8px 10px;font-size:12.5px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--teal)}
.form-input::placeholder{color:var(--text3)}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:56px}
.seg{display:flex;gap:0;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.seg-btn{flex:1;padding:8px 6px;font-size:12px;font-weight:600;background:var(--bg4);color:var(--text3);border:none;cursor:pointer;border-right:1px solid var(--border2);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.seg-btn:last-child{border-right:none}
.seg-btn:hover{background:var(--bg5);color:var(--text2)}
.seg-btn.on{color:#fff}
.seg-swatch{width:9px;height:9px;border-radius:3px;background:currentColor}
.pick-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto}
.pick-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;text-align:left;color:var(--text);transition:all .12s}
.pick-item:hover{border-color:var(--teal);background:var(--bg4)}
.pick-avatar{width:28px;height:28px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pick-divider{font-size:10px;color:var(--text3);text-align:center;padding:6px 0 2px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:11px 20px;border-radius:var(--r);font-size:12.5px;z-index:2147483000;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.18);max-width:min(560px,92vw);text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading-state{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);gap:10px;font-size:13px;flex:1}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px;border:2px solid var(--bg2)}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
input:focus-visible,select:focus-visible,button:focus-visible{outline:2px solid rgba(13,148,136,.4);outline-offset:1px}
@media(max-width:760px){.sidebar-wrap{display:none}.month-label{min-width:120px;font-size:13px}.content{padding:12px}.cal-day{min-height:64px}}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
"use strict";
var SUPA_URL='https://piamamighqiielfztgic.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpYW1hbWlnaHFpaWVsZnp0Z2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjkxMzUsImV4cCI6MjA5MzQ0NTEzNX0.YwLflTw6F4cRzmY78QoAY6Zud2IHGVP5xL_yvMFxheA';
var db=null;

// ---- state ----
var S={
  view:new Date(),            // any date in the shown month
  events:[],
  members:[],                 // [{email,display_name}]
  me:null,                    // {email,name}
  hideTypes:{},               // type -> true if hidden
  hidePeople:{},              // email -> true if hidden
  editId:null,
  formType:'timeoff',
  rtStatus:'init'
};

var TYPES=[
  {id:'timeoff', label:'Time Off',  color:null},   // person coloured
  {id:'note',    label:'Notes',     color:'#0d9488'},
  {id:'deadline',label:'Deadlines', color:'#ea580c'}
];
var PEOPLE_PALETTE=['#2563eb','#7c3aed','#db2777','#16a34a','#d97706','#0891b2','#4f46e5','#be123c','#65a30d','#c026d3','#0f766e','#b45309'];
var WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ---- utils ----
function pad2(n){return (n<10?'0':'')+n;}
function iso(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function fromIso(s){var p=s.split('-');return new Date(+p[0],(+p[1])-1,+p[2],12,0,0);}
function dayNum(s){var p=s.split('-');return Math.floor(Date.UTC(+p[0],(+p[1])-1,+p[2])/86400000);}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function esc(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(name){name=(name||'').trim();if(!name)return '?';var p=name.split(/\s+/);return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function hashIdx(str,len){var h=0,i;str=str||'';for(i=0;i<str.length;i++){h=((h<<5)-h+str.charCodeAt(i))|0;}return Math.abs(h)%len;}
function personColor(email){return PEOPLE_PALETTE[hashIdx((email||'').toLowerCase(),PEOPLE_PALETTE.length)];}
function eventColor(ev){if(ev.type==='note')return '#0d9488';if(ev.type==='deadline')return '#ea580c';return personColor(ev.member_email||ev.created_by||'');}
function displayFor(email){var m=S.members.filter(function(x){return (x.email||'').toLowerCase()===(email||'').toLowerCase();})[0];return m?(m.display_name||m.email):email;}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},2600);}

// ---- boot ----
document.addEventListener('DOMContentLoaded',function(){
  var tries=0;
  (function wait(){
    tries++;
    if(typeof supabase==='undefined'||!supabase.createClient){
      if(tries>150){document.getElementById('content-inner').innerHTML='<div class="loading-state">Could not load Supabase library. Check your connection.</div>';return;}
      return setTimeout(wait,80);
    }
    db=supabase.createClient(SUPA_URL,SUPA_KEY);
    boot();
  })();
});

async function boot(){
  await loadMembers();
  await loadEvents();
  render();
  subscribeRealtime();
  resolveIdentity();
}

async function loadMembers(){
  try{
    var res=await db.from('team_members').select('email,display_name').order('display_name');
    S.members=(res.data||[]).filter(function(m){return m.email;});
  }catch(e){S.members=[];}
}

async function resolveIdentity(){
  // 1) authenticated session on this origin (same as ERP)
  try{
    var u=await db.auth.getUser();
    if(u&&u.data&&u.data.user&&u.data.user.email){setMe(u.data.user.email,null);return;}
  }catch(e){}
  // 2) URL params (Command Center can pass ?email=&name=)
  var q=new URLSearchParams(location.search);
  if(q.get('email')){setMe(q.get('email'),q.get('name'));return;}
  // 3) ask the host (Command Center) who we are, then give it a moment to reply
  try{window.parent&&window.parent.postMessage({type:'tgk-cal-ready'},'*');}catch(e){}
  await new Promise(function(r){setTimeout(r,700);});
  if(S.me)return;
  // 4) remembered pick
  try{var saved=JSON.parse(localStorage.getItem('tgk_cal_me')||'null');if(saved&&saved.email){setMe(saved.email,saved.name);return;}}catch(e){}
  if(S.me)return;
  // 5) ask
  pickIdentity();
}
function setMe(email,name){
  S.me={email:email,name:name||displayFor(email)||email};
  try{localStorage.setItem('tgk_cal_me',JSON.stringify(S.me));}catch(e){}
  renderChrome();render();
}

window.addEventListener('message',function(ev){
  var d=ev.data||{};
  if(d.type==='tgk-identity'&&d.email){
    hide('pick-overlay');
    setMe(d.email,d.name);
  }
});

function pickIdentity(){
  return new Promise(function(resolve){
    var list=document.getElementById('pick-list');
    var html='';
    S.members.forEach(function(m){
      var nm=m.display_name||m.email;var c=personColor(m.email);
      html+='<button class="pick-item" data-email="'+esc(m.email)+'" data-name="'+esc(nm)+'"><span class="pick-avatar" style="background:'+c+'">'+esc(initials(nm))+'</span>'+esc(nm)+'</button>';
    });
    html+='<div class="pick-divider">or</div><button class="pick-item" id="pick-manual"><span class="pick-avatar" style="background:var(--text3)">+</span>Enter my name</button>';
    list.innerHTML=html;
    show('pick-overlay');
    list.querySelectorAll('.pick-item').forEach(function(b){
      b.onclick=function(){
        if(b.id==='pick-manual'){
          var nm=prompt('Your name:');if(!nm)return;
          var em=(nm.toLowerCase().replace(/[^a-z0-9]+/g,'.').replace(/^\.|\.$/g,''))+'@tgk.local';
          S.me={email:em,name:nm};
        }else{
          S.me={email:b.getAttribute('data-email'),name:b.getAttribute('data-name')};
        }
        try{localStorage.setItem('tgk_cal_me',JSON.stringify(S.me));}catch(e){}
        hide('pick-overlay');renderChrome();resolve();
      };
    });
  });
}

// ---- data ----
function gridBounds(){
  var first=new Date(S.view.getFullYear(),S.view.getMonth(),1);
  var start=addDays(first,-first.getDay());
  var end=addDays(start,41);
  return {start:start,end:end};
}
async function loadEvents(){
  var b=gridBounds();
  try{
    var res=await db.from('calendar_events').select('*')
      .gte('end_date',iso(b.start)).lte('start_date',iso(b.end))
      .order('start_date',{ascending:true});
    if(res.error){toast('Load failed: '+res.error.message);S.events=[];return;}
    S.events=res.data||[];
  }catch(e){toast('Load failed: '+e.message);S.events=[];}
}

function subscribeRealtime(){
  setSync('busy','Connecting...');
  try{
    db.channel('calendar_events_rt')
      .on('postgres_changes',{event:'*',schema:'public',table:'calendar_events'},function(){
        loadEvents().then(function(){render();});
      })
      .subscribe(function(status){
        if(status==='SUBSCRIBED')setSync('ok','Live');
        else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT')setSync('err','Offline');
      });
  }catch(e){setSync('err','Offline');}
}
function setSync(cls,label){S.rtStatus=cls;var d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');if(d)d.className='sync-dot '+cls;if(l)l.textContent=label;}

// ---- chrome (sidebar filters + identity) ----
function renderChrome(){
  // me
  var mc=document.getElementById('me-card');
  if(S.me){
    var c=personColor(S.me.email);
    mc.innerHTML='<div class="me-row"><span class="me-avatar" style="background:'+c+'">'+esc(initials(S.me.name))+'</span><span class="me-name">'+esc(S.me.name)+'</span></div><button class="me-change" onclick="changeMe()">Not you? Change</button>';
  }else{mc.innerHTML='';}
  // type filters
  var tf=document.getElementById('type-filters'),h='';
  TYPES.forEach(function(t){
    var col=t.color||'#6b7280';
    var n=S.events.filter(function(e){return e.type===t.id;}).length;
    var off=S.hideTypes[t.id]?' off':'';
    h+='<button class="nav-item'+off+'" onclick="toggleType(\''+t.id+'\')"><span class="nav-dot" style="background:'+col+'"></span>'+esc(t.label)+'<span class="nav-badge">'+n+'</span></button>';
  });
  tf.innerHTML=h;
  // people (only those with time off)
  var emails={};
  S.events.forEach(function(e){if(e.type==='timeoff'&&e.member_email)emails[e.member_email.toLowerCase()]=e.member_name||displayFor(e.member_email);});
  var keys=Object.keys(emails);
  document.getElementById('people-hdr').style.display=keys.length?'':'none';
  var pf=document.getElementById('people-filters'),ph='';
  keys.sort().forEach(function(em){
    var off=S.hidePeople[em]?' off':'';
    ph+='<button class="nav-item'+off+'" onclick="togglePerson(\''+em.replace(/'/g,"\\'")+'\')"><span class="nav-dot" style="background:'+personColor(em)+';border-radius:50%"></span>'+esc(emails[em])+'</button>';
  });
  pf.innerHTML=ph;
}
function changeMe(){pickIdentity().then(function(){render();});}
function toggleType(id){S.hideTypes[id]=!S.hideTypes[id];renderChrome();render();}
function togglePerson(em){S.hidePeople[em]=!S.hidePeople[em];renderChrome();render();}

// ---- calendar render ----
function visibleEvents(){
  return S.events.filter(function(e){
    if(S.hideTypes[e.type])return false;
    if(e.type==='timeoff'&&e.member_email&&S.hidePeople[(e.member_email||'').toLowerCase()])return false;
    return true;
  });
}
function shiftMonth(n){S.view=new Date(S.view.getFullYear(),S.view.getMonth()+n,1);loadEvents().then(function(){render();});}
function goToday(){S.view=new Date();loadEvents().then(function(){render();});}

function render(){
  document.getElementById('month-label').textContent=MONTHS[S.view.getMonth()]+' '+S.view.getFullYear();
  var b=gridBounds();
  var todayIso=iso(new Date());
  var evs=visibleEvents();

  var head='<div class="cal-weekdays">'+WD.map(function(w){return '<div class="cal-wd">'+w+'</div>';}).join('')+'</div>';
  var body='<div class="cal-grid">';

  for(var w=0;w<6;w++){
    var weekStart=addDays(b.start,w*7);
    var weekStartNum=dayNum(iso(weekStart));
    // day cells
    var cells='';
    for(var c=0;c<7;c++){
      var d=addDays(weekStart,c);
      var di=iso(d);
      var out=(d.getMonth()!==S.view.getMonth())?' out':'';
      var today=(di===todayIso)?' today':'';
      cells+='<div class="cal-day'+out+today+'" onclick="dayClick(\''+di+'\')"><div class="cal-daynum">'+d.getDate()+'</div></div>';
    }
    // segments for this week
    var segs=[];
    evs.forEach(function(e){
      var sN=dayNum(e.start_date),eN=dayNum(e.end_date||e.start_date);
      if(eN<weekStartNum||sN>weekStartNum+6)return;
      var s=Math.max(sN,weekStartNum),en=Math.min(eN,weekStartNum+6);
      segs.push({ev:e,cs:s-weekStartNum,ce:en-weekStartNum,contL:sN<weekStartNum,contR:eN>weekStartNum+6,len:en-s});
    });
    segs.sort(function(a,z){return a.cs-z.cs||z.len-a.len;});
    // lane packing
    var lanes=[];
    segs.forEach(function(sg){
      var li=0;
      for(;;li++){
        if(!lanes[li])lanes[li]=[];
        var clash=lanes[li].some(function(r){return !(sg.ce<r[0]||sg.cs>r[1]);});
        if(!clash){lanes[li].push([sg.cs,sg.ce]);sg.lane=li;break;}
      }
    });
    var HEAD=26,LANE=21,BAR=18,MAXLANE=4;
    var moreByCol={};
    var bars='';
    segs.forEach(function(sg){
      if(sg.lane>=MAXLANE){for(var k=sg.cs;k<=sg.ce;k++){moreByCol[k]=(moreByCol[k]||0)+1;}return;}
      var e=sg.ev;
      var col=eventColor(e);
      var left=(sg.cs/7*100), width=((sg.ce-sg.cs+1)/7*100);
      var top=HEAD+sg.lane*LANE;
      var label=e.type==='timeoff'?((e.member_name||displayFor(e.member_email)||'Time off')+(e.title&&e.title!=='Time off'?(' - '+e.title):'')):(e.title||'(untitled)');
      var cls='cal-bar'+(sg.contL?' contL':'')+(sg.contR?' contR':'');
      bars+='<div class="'+cls+'" style="left:calc('+left+'% + 3px);width:calc('+width+'% - 6px);top:'+top+'px;background:'+col+'" onclick="event.stopPropagation();openEntry(\''+e.id+'\')" title="'+esc(label)+'">'+(sg.contL?'&laquo; ':'')+esc(label)+'</div>';
    });
    Object.keys(moreByCol).forEach(function(cc){
      var left=(cc/7*100);
      bars+='<div class="cal-more" style="left:calc('+left+'% + 6px);top:'+(HEAD+MAXLANE*LANE)+'px">+'+moreByCol[cc]+' more</div>';
    });
    var need=HEAD+Math.min(lanes.length,MAXLANE+1)*LANE+4;
    body+='<div class="cal-week" style="min-height:'+Math.max(90,need)+'px"><div class="cal-week-bg">'+cells+'</div><div class="cal-bars">'+bars+'</div></div>';
  }
  body+='</div>';
  document.getElementById('content-inner').innerHTML=head+body;
  renderChrome();
}

function dayClick(di){openEntry(null,di);}

// ---- entry modal ----
function buildTypeSeg(){
  var seg=document.getElementById('type-seg'),h='';
  TYPES.forEach(function(t){
    var col=t.color||'#6b7280';
    var on=S.formType===t.id;
    h+='<button class="seg-btn'+(on?' on':'')+'" style="'+(on?('background:'+(t.color||personColor(S.me?S.me.email:''))+';'):'')+'" onclick="setFormType(\''+t.id+'\')"><span class="seg-swatch" style="'+(on?'background:#fff':'background:'+col)+'"></span>'+esc(t.label)+'</button>';
  });
  seg.innerHTML=h;
  document.getElementById('person-row').style.display=(S.formType==='timeoff')?'':'none';
  document.getElementById('title-label').textContent=(S.formType==='timeoff')?'Reason (optional)':'Title';
  document.getElementById('f-title').placeholder=(S.formType==='timeoff')?'e.g. Vacation, Sick':'What is it?';
}
function setFormType(t){S.formType=t;buildTypeSeg();}

function fillPeopleSelect(sel){
  var opts='';var seen={};
  S.members.forEach(function(m){seen[(m.email||'').toLowerCase()]=1;opts+='<option value="'+esc(m.email)+'">'+esc(m.display_name||m.email)+'</option>';});
  if(S.me&&!seen[(S.me.email||'').toLowerCase()])opts=('<option value="'+esc(S.me.email)+'">'+esc(S.me.name)+'</option>')+opts;
  document.getElementById('f-person').innerHTML=opts;
  if(sel)document.getElementById('f-person').value=sel;
}

function openEntry(id,presetDate){
  S.editId=id;
  var ev=id?S.events.filter(function(e){return e.id===id;})[0]:null;
  document.getElementById('entry-heading').textContent=id?'Edit Entry':'New Entry';
  document.getElementById('entry-delete').style.display=id?'':'none';
  S.formType=ev?ev.type:'timeoff';
  buildTypeSeg();
  fillPeopleSelect(ev?ev.member_email:(S.me?S.me.email:''));
  var today=iso(new Date());
  document.getElementById('f-start').value=ev?ev.start_date:(presetDate||today);
  document.getElementById('f-end').value=ev?(ev.end_date||ev.start_date):(presetDate||today);
  document.getElementById('f-title').value=ev?(ev.title||''):'';
  document.getElementById('f-desc').value=ev?(ev.description||''):'';
  show('entry-overlay');
  setTimeout(function(){document.getElementById(S.formType==='timeoff'?'f-start':'f-title').focus();},50);
}
function closeEntry(){hide('entry-overlay');S.editId=null;}

async function saveEntry(){
  var start=document.getElementById('f-start').value;
  var end=document.getElementById('f-end').value||start;
  var title=document.getElementById('f-title').value.trim();
  var desc=document.getElementById('f-desc').value.trim();
  if(!start){toast('Pick a start date');return;}
  if(dayNum(end)<dayNum(start)){toast('End date is before start date');return;}
  if(S.formType!=='timeoff'&&!title){toast('Add a title');return;}
  var row={
    type:S.formType,
    title:title||(S.formType==='timeoff'?'Time off':''),
    description:desc||null,
    start_date:start,
    end_date:end,
    created_by:S.me?S.me.email:null
  };
  if(S.formType==='timeoff'){
    var pe=document.getElementById('f-person').value;
    row.member_email=pe;
    row.member_name=displayFor(pe)||pe;
  }else{row.member_email=null;row.member_name=null;}
  var btn=document.getElementById('entry-save');btn.disabled=true;btn.textContent='Saving...';
  try{
    var res;
    if(S.editId){res=await db.from('calendar_events').update(row).eq('id',S.editId);}
    else{res=await db.from('calendar_events').insert(row);}
    if(res.error){toast('Save failed: '+res.error.message);}
    else{toast(S.editId?'Updated':'Added');closeEntry();await loadEvents();render();}
  }catch(e){toast('Save failed: '+e.message);}
  btn.disabled=false;btn.textContent='Save';
}

async function deleteEntry(){
  if(!S.editId)return;
  if(!confirm('Delete this entry?'))return;
  try{
    var res=await db.from('calendar_events').delete().eq('id',S.editId);
    if(res.error){toast('Delete failed: '+res.error.message);return;}
    toast('Deleted');closeEntry();await loadEvents();render();
  }catch(e){toast('Delete failed: '+e.message);}
}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){hide('entry-overlay');}});
</script>
